<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- TODO: Enable content security policy !!! -->
    <!-- https://developer.mozilla.org/en-US/docs/Web/HTTP/CSP -->
    <!-- <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'"> -->
    <!-- <meta http-equiv="X-Content-Security-Policy" content="default-src 'self'; script-src 'self'"> -->
    <title>Yt2Mp3</title>
    <link rel="stylesheet" href="./index.css">
    <link rel="stylesheet" href="../../node_modules/bulma/css/bulma.min.css">
    <script src="./index.js"></script>
  </head>
  <body>
    <div class="container px-4 py-4">
      
      <!-- Video search form -->
      <fieldset class="mb-4" disabled>
        <div class="field has-addons">
          <div class="control is-expanded">
            <input id="video-url-field" class="input" type="text" placeholder="YouTube video url">
          </div>
          <div class="control">
            <a id="video-search-button" class="button is-info">Search</a>
          </div>
        </div>
      </fieldset>

      <!-- Video search result card (Only visible after searching a video) -->
      <div id="video-search-result-card" class="card is-invisible">
        <div class="card-content">
          <div class="columns is-mobile">
            <div class="column is-two-thirds">
              <p id="video-title" class="title is-4"><!-- Dynamic value --></p>
              <p id="youtube-channel-name" class="subtitle is-6"><!-- Dynamic value --></p>
            </div>
            <div class="column">
              <figure class="image">
                <img id="video-thumbnail" class="is-4by3">
              </figure>
            </div>
          </div>
          <a id="download-start-button" class="button is-info is-fullwidth">Download as Mp3</a>
        </div>
      </div>

      <!-- Video download progress card (Only visible during downloads) -->
      <div id="download-progress-card" class="card is-invisible">
        <div class="card-content">
          <div class="columns is-mobile">
            <div class="column is-two-thirds">
              <p id="download-video-title" class="title is-4"><!-- Dynamic value --></p>
              <p id="download-progress-details" class="subtitle is-6">
                <!--
                Progress: 20%
                <br>
                Speed: 20 Mb/s
                <br>
                Total size: 100 Mb
                -->
              </p>
            </div>
            <div class="column">
              <figure class="image">
                <img id="video-download-thumbnail" class="is-4by3">
              </figure>
            </div>
          </div>
          <progress id="download-progressbar" class="progress is-info" value="0" max="100"></progress>
        </div>
      </div>

    </div>
  </body>
</html>
