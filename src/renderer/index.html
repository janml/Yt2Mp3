<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    
    <!-- https://developer.mozilla.org/en-US/docs/Web/HTTP/CSP -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'">
    <meta http-equiv="X-Content-Security-Policy" content="default-src 'self'; script-src 'self'">
    <title>Yt2Mp3</title>
    <link rel="stylesheet" href="./index.css">
    <link rel="stylesheet" href="../../node_modules/bulma/css/bulma.min.css">
    <script src="./index.js"></script>
  </head>
  <body>
    <div class="container px-4 py-4">
      
      <!-- Video search form -->
      <fieldset class="mb-4" id="video-form">
        <div class="field has-addons">
          <div class="control is-expanded">
            <input id="video-url-field" class="input" type="text" placeholder="YouTube video url">
          </div>
          <div class="control">
            <a id="download-start-button" class="button is-info">Download</a>
          </div>
        </div>
      </fieldset>
      
      <!-- Download progress card -->
      <div class="card">
        <div class="card-content">
          <p id="download-progress-describtion" class="subtitle is-6">Hi, give me something to download 😀🖐️</p>
          <progress id="download-progressbar" class="progress is-info" value="0" max="100"></progress>
        </div>
      </div>
    </div>
  </body>
</html>
