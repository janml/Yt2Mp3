<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- TODO: Enable content security policy !!! -->
    <!-- https://developer.mozilla.org/en-US/docs/Web/HTTP/CSP -->
    <!-- <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'"> -->
    <!-- <meta http-equiv="X-Content-Security-Policy" content="default-src 'self'; script-src 'self'"> -->
    <title>Yt2Mp3</title>
    <link rel="stylesheet" href="./node_modules/bulma/css/bulma.min.css">
    <link rel="stylesheet" href="./src/renderer/css/index.css">
    <script src="./src/renderer/index.js"></script>
  </head>
  <body>
    <div class="container px-4 py-4">
      <div class="field has-addons">
        <div class="control is-expanded">
          <input id="video-url-field" class="input" type="text" placeholder="YouTube video url">
        </div>
        <div class="control">
          <a id="search-button" class="button is-info">Search</a>
        </div>
      </div>

      <div class="card">
        <div class="card-content">
          <div class="media">
            <div class="media-content">
              <p class="title is-4">Lindemann - Yukon</p>
              <p class="subtitle is-6">Channel name</p>
            </div>
            <div class="media-right">
              <figure class="image is-128x128">
                <img src="https://i.ytimg.com/vi/5yJfNY_p9Xk/hqdefault.jpg">
              </figure>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
